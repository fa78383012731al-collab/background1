<svg baseProfile="full" height="720px" version="1.1" width="1280px" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#F5F8FC" height="720" width="1280" x="0" y="0" /><text direction="rtl" fill="#2C5F8D" font-family="Arial" font-size="26px" font-weight="bold" text-anchor="middle" x="640.0" y="48">الضغط التنافسي: قوى بورتر الخمسة</text><circle cx="640" cy="370" fill="#2C5F8D" r="88" stroke="#FFFFFF" stroke-width="3" /><text direction="rtl" fill="#FFFFFF" font-family="Arial" font-size="15px" font-weight="bold" text-anchor="middle" x="640" y="362">مستشفى</text><text direction="rtl" fill="#FFFFFF" font-family="Arial" font-size="15px" font-weight="bold" text-anchor="middle" x="640" y="384">الشاعر الخاص</text><rect fill="#C8D2DC" height="145" rx="6" width="260" x="34" y="84" /><rect fill="#2C5F8D" height="38" rx="6" width="260" x="30" y="80" /><text direction="rtl" fill="#FFFFFF" font-family="Arial" font-size="13px" font-weight="bold" text-anchor="middle" x="160.0" y="104.0">حدة المنافسة (3.5/5)</text><rect fill="#FFFFFF" height="107" rx="6" stroke="#2C5F8D" stroke-width="1.5" width="260" x="30" y="118" /><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="282" y="136">منافسة قوية بين 3 منشآت خاصة</text><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="282" y="153">و6 حكومية حول السعر والموقع.</text><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="282" y="170">الرقمنة هي المهرب الوحيد.</text><rect fill="#C8D2DC" height="145" rx="6" width="260" x="994" y="84" /><rect fill="#4A8BBF" height="38" rx="6" width="260" x="990" y="80" /><text direction="rtl" fill="#FFFFFF" font-family="Arial" font-size="13px" font-weight="bold" text-anchor="middle" x="1120.0" y="104.0">قوة المشترين (4/5)</text><rect fill="#FFFFFF" height="107" rx="6" stroke="#4A8BBF" stroke-width="1.5" width="260" x="990" y="118" /><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="1242" y="136">وعي المريض يرتفع،</text><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="1242" y="153">وحساسيته للجودة تتفوق على السعر</text><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="1242" y="170">في حال توفر التجربة الممتازة.</text><rect fill="#C8D2DC" height="145" rx="6" width="260" x="994" y="302" /><rect fill="#7CB9E8" height="38" rx="6" width="260" x="990" y="298" /><text direction="rtl" fill="#FFFFFF" font-family="Arial" font-size="13px" font-weight="bold" text-anchor="middle" x="1120.0" y="322.0">قوة الموردين (3/5)</text><rect fill="#FFFFFF" height="107" rx="6" stroke="#7CB9E8" stroke-width="1.5" width="260" x="990" y="336" /><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="1242" y="354">قوة تفاوضية عالية</text><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="1242" y="371">للكوادر الطبية المتخصصة.</text><rect fill="#C8D2DC" height="145" rx="6" width="260" x="994" y="524" /><rect fill="#5CB85C" height="38" rx="6" width="260" x="990" y="520" /><text direction="rtl" fill="#FFFFFF" font-family="Arial" font-size="13px" font-weight="bold" text-anchor="middle" x="1120.0" y="544.0">الداخلون الجدد (3/5)</text><rect fill="#FFFFFF" height="107" rx="6" stroke="#5CB85C" stroke-width="1.5" width="260" x="990" y="558" /><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="1242" y="576">حواجز دخول مالية عالية (30M+)،</text><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="1242" y="593">التهديد قادم من العيادات الرقمية.</text><rect fill="#C8D2DC" height="145" rx="6" width="260" x="34" y="524" /><rect fill="#4CAF50" height="38" rx="6" width="260" x="30" y="520" /><text direction="rtl" fill="#FFFFFF" font-family="Arial" font-size="13px" font-weight="bold" text-anchor="middle" x="160.0" y="544.0">المنتجات البديلة (2.5/5)</text><rect fill="#FFFFFF" height="107" rx="6" stroke="#4CAF50" stroke-width="1.5" width="260" x="30" y="558" /><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="282" y="576">الطب التقليدي والسفر للعلاج.</text><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="282" y="593">المريض يفضل الرعاية المحلية</text><text direction="rtl" fill="#333333" font-family="Arial" font-size="11px" text-anchor="end" x="282" y="610">إذا توفرت الجودة.</text><line stroke="#2C5F8D" stroke-dasharray="none" stroke-width="2.5" x1="578" x2="220" y1="308" y2="152" /><line stroke="#4A8BBF" stroke-dasharray="none" stroke-width="2.5" x1="702" x2="1060" y1="308" y2="152" /><line stroke="#7CB9E8" stroke-dasharray="none" stroke-width="2.5" x1="728" x2="1060" y1="370" y2="370" /><line stroke="#5CB85C" stroke-dasharray="none" stroke-width="2.5" x1="702" x2="1060" y1="432" y2="592" /><line stroke="#4CAF50" stroke-dasharray="none" stroke-width="2.5" x1="578" x2="220" y1="432" y2="592" /></svg>